{% extends 'base.html' %}

{% block title %}Aggiungi Docente - Olympian's Dance Academy{% endblock %}

{% block content %}
<div class="animate-in">
    <header class="header-container">
        <div class="header-title">
            <a href="{% url 'maestre' %}" style="text-decoration: none; color: var(--secondary-color); font-weight: 600; display: flex; align-items: center; gap: 4px; margin-bottom: 0.5rem; font-size: 0.9rem;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                Torna a Maestre
            </a>
            <h1>Aggiungi Docente</h1>
            <p>Registra una nuova figura professionale nel corpo docente dell'accademia.</p>
        </div>
    </header>

    <div class="content-box" style="max-width: 800px; margin: 0 auto;">
        <form method="POST" action="{% url 'nuova_maestra' %}" class="form-container">
            {% csrf_token %}
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
                <div class="form-group">
                    <label for="nome" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Nome</label>
                    <input type="text" id="nome" name="nome" required style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: var(--radius-md);">
                </div>
                <div class="form-group">
                    <label for="cognome" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Cognome</label>
                    <input type="text" id="cognome" name="cognome" required style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: var(--radius-md);">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
                <div class="form-group">
                    <label for="telefono" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Telefono</label>
                    <input type="text" id="telefono" name="telefono" style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: var(--radius-md);">
                </div>
                <div class="form-group">
                    <label for="email" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Email</label>
                    <input type="email" id="email" name="email" style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: var(--radius-md);">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem;">
                <div class="form-group">
                    <label for="specializzazione" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Specializzazione</label>
                    <input type="text" id="specializzazione" name="specializzazione" placeholder="es. Danza Classica" style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: var(--radius-md);">
                </div>
                <div class="form-group">
                    <label for="compenso_mensile" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Compenso Mensile (€)</label>
                    <input type="number" step="0.01" id="compenso_mensile" name="compenso_mensile" style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: var(--radius-md);">
                </div>
            </div>

            <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                <a href="{% url 'maestre' %}" class="btn btn-outline-purple">Annulla</a>
                <button type="submit" class="btn btn-gold">Salva Docente</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
